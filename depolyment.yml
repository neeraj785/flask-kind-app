apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: github-devops-app
  template:
    metadata:
      labels:
        app: github-devops-app
    spec:
      containers:
      - name: app
        image: github-devops-app:latest
        ports:
        - containerPort: 5000