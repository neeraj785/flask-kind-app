name: CD to Kind Cluster

on:
  workflow_run:
    workflows: ["CI for Flask App"]
    types:
      - completed

jobs:
  deploy-to-kind:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t github-devops-app:latest .

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.1

      - name: Build Docker image
        # DO NOT use sudo here. Execute as the default runner user.
        run: docker build -t github-devops-app:latest .

      - name: Load Docker image into Kind
        # Run completely without sudo.
        run: kind load docker-image github-devops-app:latest --name devops-cluster


      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
