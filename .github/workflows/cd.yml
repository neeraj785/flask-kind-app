name: CD to Kind Cluster

on:
  workflow_run:
    workflows: ["CI for Flask App"]
    types:
      - completed

jobs:
  deploy-to-kind:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.1

      - name: Install and Create Kind Cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: devops-cluster
          wait: 120s

      - name: Build Docker image
        # Fixed path to point to your new folder structure
        run: docker build -t github-devops-app:latest ./devops-github-app

      - name: Load Docker image into Kind
        run: kind load docker-image github-devops-app:latest --name devops-cluster

      
